<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!--

  ADD FONTS:

  1. Put fonts files in `~/.local/share/fonts`

  2. Check font family name:
     `fc-list : family | sort | fzf`

  3. Reset fontconfig cache:
     `fc-cache -fv`

  -->

  <!--

  DEFAULT FONTS:

  1. Add the font (see above)

  2. Edit the rules below.

  3. Reset fontconfig cache:
     `fc-cache -fv`

  4. Verify that new rules match the desired font:
     `fc-match <font>`, e.g. `fc-match monospace`

  -->

  <!--

  MATCH RULES:

  Use `<match>` to intercept font requests and edit them on the fly (if the
  test condition is met).

  Use it for specific overrides (like replacing a broken font), rendering
  tweaks (like turning on subpixel hinting for a specific font family), or
  global rendering rules (like forcing antialiasing across the whole system).

  -->

  <match target="pattern">
    <test name="family" qual="any">
      <string>monospace</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>JetBrains Mono</string>
    </edit>
  </match>

  <!--

  The `<alias>` tag is actually a wrapper. A simplified shortcut that
  Fontconfig provides specifically for grouping and ordering families.

  When you use it, you are telling the system: "Hey, I want to create a
  family tree. When someone asks for Category X, prefer Font A, then Font B,
  then Font C."

  -->

   <alias>
    <family>serif</family>
    <prefer>
      <family>Liberation Serif</family>
      <family>Noto Color Emoji</family>
      <family>Symbols Nerd Font</family>
    </prefer>
  </alias>

  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Liberation Sans</family>
      <family>Noto Color Emoji</family>
      <family>Symbols Nerd Font</family>
    </prefer>
  </alias>

  <alias>
    <family>monospace</family>
    <prefer>
      <family>JetBrains Mono</family>
      <family>Noto Color Emoji</family>
      <family>Symbols Nerd Font Mono</family>
    </prefer>
  </alias>

</fontconfig>
