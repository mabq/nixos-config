# IMPORTANT!
#  This file is not used anymore.
#  The `include` field cannot include environment variables, so in order to
#  avoid hard-coding the path of the theme file we generate the config file
#  with the home-manager foot module.

# [main]
# include=~/.config/nixos-config/current/theme/foot.ini
# term=xterm-256color
# font=monospace:size=9
# pad=14x14
# initial-window-mode=windowed
# workers=0
#
# [scrollback]
# lines=10000
#
# [cursor]
# style=block
# blink=no
#
# [key-bindings]
# clipboard-copy=Control+Insert
# primary-paste=none
# clipboard-paste=Control+Shift+v
